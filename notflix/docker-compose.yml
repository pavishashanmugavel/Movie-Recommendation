services:
  app:
    build: .
    ports:
      - "6060:6060"
    env_file:
      - ./server/.env
    depends_on:
      - mongo

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # 🔥 allow Docker access
    user: root   # 🔥 required for docker access

volumes:
  jenkins_home: